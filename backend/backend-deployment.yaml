apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 101669202146.dkr.ecr.ap-south-1.amazonaws.com/cbz-backend
          ports:
            - containerPort: 8080
